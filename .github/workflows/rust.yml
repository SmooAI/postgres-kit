name: Rust

on:
  pull_request:
    branches: [main]
    paths: ["crates/**", ".github/workflows/rust.yml"]
  push:
    branches: [main]
    paths: ["crates/**"]

defaults:
  run:
    working-directory: crates/postgres-kit

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test (unit)
        run: cargo test
      - name: Test (integration — real Postgres via testcontainers)
        run: cargo test --test integration -- --ignored
