name: Publish crate (crates.io)

# Manual trigger — run after the crate's version has been bumped on main.
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: crates/postgres-kit

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.SMOOAI_CARGO_REGISTRY_TOKEN }}
